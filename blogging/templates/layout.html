{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}
      ChaiHeadQ
       {% endblock %}
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    {% comment %} <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> {% endcomment %}
  </head>
  <body >
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
  <ul class="navbar-nav me-auto mb-2 mb-lg-0">
    <li class="nav-item">
      <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">Home</a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.resolver_match.url_name == 'new_blog' %}active{% endif %}" href="{% url 'home' %}">All Blogs</a>
    </li>
  </ul>

  <div class="d-flex align-items-center">
    {% if user.is_authenticated %}
      <span class="text-light me-3"><a href="{% url 'profile' user.username %}" class="text-decoration-none text-light">Welcome, {{ user.username }}!</a></span>
      <a href="{% url 'new_blog' %}" class="btn btn-primary me-2">Create Blog</a>
      <form action="{% url 'logout' %}" method="post" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-danger">Logout</button>
      </form>
    {% else %}
      <a href="{% url 'login' %}" class="btn btn-outline-light me-2">Login</a>
      <a href="{% url 'register' %}" class="btn btn-success">Register</a>
    {% endif %}
  </div>
</div>
    </div>
  </nav>
    <div class="container text-light text-center mt-5">
      {% block content %}
      {% endblock %}
    </div>
  </body>
</html>
